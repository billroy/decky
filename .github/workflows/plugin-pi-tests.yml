name: Plugin PI Tests

on:
  pull_request:
    paths:
      - 'plugin/**'
      - 'bridge/**'
      - 'docs/planning/pi-control-coverage-map.json'
      - '.github/workflows/plugin-pi-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'plugin/**'
      - 'bridge/**'
      - 'docs/planning/pi-control-coverage-map.json'

jobs:
  plugin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            plugin/package-lock.json
            bridge/package-lock.json
      - run: npm ci
      - run: npm --prefix ../bridge ci
- run: npm run test:pi:coverage-map
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:pi
