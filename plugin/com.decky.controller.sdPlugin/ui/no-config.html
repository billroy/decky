<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decky Action Info</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #2b2b2b;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      line-height: 1.4;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.18);
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 600;
    }
    p {
      margin: 0 0 8px 0;
      color: #cbd5e1;
    }
    ul {
      margin: 6px 0 0 18px;
      padding: 0;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>No Per-Key Settings</h3>
    <p>This action does not have per-key Property Inspector fields.</p>
    <ul>
      <li>Use <strong>Decky Slot</strong> for macro/widget configuration.</li>
      <li>Global utility toggles are in the Decky Slot inspector.</li>
    </ul>
  </div>
</body>
</html>
